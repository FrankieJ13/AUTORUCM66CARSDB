name: Scrape auto.ru

on:
  schedule:
    # По UTC. 21:00 / 01:00 / 10:00 UTC = 00:00 / 04:00 / 13:00 МСК.
    - cron: '0 21 * * *'
    - cron: '0 1 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    # На self-hosted Windows runner — IP вашего ПК, auto.ru его пропускает.
    runs-on: [self-hosted, Windows]
    timeout-minutes: 30
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: python -m pip install --upgrade pip; python -m pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scrape.py cars.csv

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cars.csv
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm")
            git commit -m "scrape: $ts UTC"
            git push
          } else {
            Write-Host "no changes"
          }
